<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Premium Slate -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>
    
    <!-- Brand Gradient: Trustworthy Public Utility Blue -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"></stop>
      <stop offset="100%" stop-color="#2563EB"></stop>
    </linearGradient>
    
    <!-- Subtle glow for the live pulse dot -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
      <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
    </filter>
  </defs>
  
  <!-- Smooth App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"></rect>
  
  <!-- Subtle inner border for premium lighting effect -->
  <rect width="508" height="508" x="2" y="2" rx="110" fill="none" stroke="#475569" stroke-width="2" opacity="0.4"></rect>

  <!-- Signal / Pulse Rings representing Live Crowd Status -->
  <!-- Outer Ring Animated -->
  <circle cx="256" cy="150" r="100" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.15">
    <animate attributeName="r" values="80; 110; 80" dur="4s" repeatCount="indefinite"></animate>
    <animate attributeName="opacity" values="0.25; 0.05; 0.25" dur="4s" repeatCount="indefinite"></animate>
  </circle>
  
  <!-- Inner Ring Animated -->
  <circle cx="256" cy="150" r="68" fill="none" stroke="url(#brand)" stroke-width="6" opacity="0.3">
    <animate attributeName="r" values="55; 75; 55" dur="4s" repeatCount="indefinite"></animate>
    <animate attributeName="opacity" values="0.4; 0.1; 0.4" dur="4s" repeatCount="indefinite"></animate>
  </circle>

  <!-- Live Dot / Location Pin Head / Voter Head -->
  <circle cx="256" cy="150" r="32" fill="url(#brand)"></circle>
  <circle cx="256" cy="150" r="32" fill="url(#brand)" filter="url(#glow)" opacity="0.6"></circle>

  <!-- Abstract 'V' for Vote/Voter and bottom of Location Pin -->
  <path d="M136,230 L236,380 C246,395 266,395 276,380 L376,230" fill="none" stroke="#F8FAFC" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>